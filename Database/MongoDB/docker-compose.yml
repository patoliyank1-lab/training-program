version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongo-coupon
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./coupons.json:/docker-entrypoint-initdb.d/coupons.json # Seed file
      - mongo-data:/data/db # Persistent data

volumes:
  mongo-data:
